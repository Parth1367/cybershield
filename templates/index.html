<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBERSHIELD - Phishing Detector</title>
  <style>
    :root {
      --primary: #00ff88;
      --warning: #ffaa00;
      --destructive: #ff4757;
      --accent: #ff6b9d;
      --secondary: rgba(20, 20, 30, 0.8);
      --card: rgba(15, 15, 25, 0.95);
      --input: rgba(40, 40, 60, 0.6);
      --border: rgba(100, 100, 120, 0.3);
      --muted-foreground: rgba(200, 200, 220, 0.6);
      --foreground: #ffffff;
      --shadow-card: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
      --glow-primary: 0 0 20px rgba(0, 255, 136, 0.4);
      --gradient-safe: linear-gradient(135deg, rgba(0, 255, 136, 0.15) 0%, rgba(0, 200, 100, 0.1) 100%);
      --gradient-warning: linear-gradient(135deg, rgba(255, 170, 0, 0.2) 0%, rgba(255, 150, 0, 0.15) 100%);
      --gradient-danger: linear-gradient(135deg, rgba(255, 71, 87, 0.25) 0%, rgba(255, 50, 70, 0.2) 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Orbitron', 'Courier New', monospace;
      background: radial-gradient(ellipse at top, #0a0a1a 0%, #000000 70%);
      color: var(--foreground);
      min-height: 100vh;
      overflow-x: hidden;
    }

    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
    }

    /* Floating particles */
    .particles {
      pointer-events: none;
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      height: 2px;
      width: 2px;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0.6;
      animation: float-particle 4s ease-in-out infinite;
    }

    @keyframes float-particle {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.6; }
      50% { transform: translateY(-20px) rotate(180deg); opacity: 1; }
    }

    .container {
      width: 100%;
      max-width: 42rem;
      position: relative;
      z-index: 10;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: slide-up 0.8s ease-out;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 1rem;
      border-radius: 9999px;
      border: 1px solid rgba(0, 255, 136, 0.3);
      background: rgba(0, 255, 136, 0.05);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: var(--primary);
      margin-bottom: 1.5rem;
      animation: flicker 2s ease-in-out infinite;
    }

    .status-dot {
      height: 6px;
      width: 6px;
      border-radius: 50%;
      background: var(--primary);
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--primary), #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.05em;
      text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
      animation: glow-text 2s ease-in-out infinite alternate;
    }

    @keyframes glow-text {
      from { filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.4)); }
      to { filter: drop-shadow(0 0 30px rgba(0, 255, 136, 0.6)); }
    }

    header p {
      color: var(--muted-foreground);
      font-size: 0.875rem;
      max-width: 32rem;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Scanner Card */
    .scanner-card {
      position: relative;
      overflow: hidden;
      border-radius: 1rem;
      border: 1px solid rgba(0, 255, 136, 0.2);
      background: var(--card);
      backdrop-filter: blur(20px);
      padding: 1.5rem;
      animation: slide-up 0.8s ease-out 0.1s both;
      box-shadow: var(--shadow-card);
    }

    @media (min-width: 768px) {
      .scanner-card { padding: 2rem; }
    }

    /* Corner brackets */
    .bracket {
      position: absolute;
      border-color: rgba(0, 255, 136, 0.6);
    }

    .bracket-tl { top: 0.75rem; left: 0.75rem; width: 1rem; height: 1rem; border-top: 2px solid; border-left: 2px solid; }
    .bracket-tr { top: 0.75rem; right: 0.75rem; width: 1rem; height: 1rem; border-top: 2px solid; border-right: 2px solid; }
    .bracket-bl { bottom: 0.75rem; left: 0.75rem; width: 1rem; height: 1rem; border-bottom: 2px solid; border-left: 2px solid; }
    .bracket-br { bottom: 0.75rem; right: 0.75rem; width: 1rem; height: 1rem; border-bottom: 2px solid; border-right: 2px solid; }

    /* Scanner line */
    .scanner-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      animation: scan 2s linear infinite;
    }

    @keyframes scan {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(0, 255, 136, 0.8);
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 1rem;
      border-radius: 0.5rem;
      background: var(--input);
      border: 1px solid var(--border);
      color: var(--foreground);
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(0, 255, 136, 0.3);
    }

    input::placeholder {
      color: rgba(200, 200, 220, 0.4);
    }

    button {
      position: relative;
      overflow: hidden;
      width: 100%;
      padding: 1rem 1.5rem;
      border-radius: 0.5rem;
      background: var(--primary);
      color: #000;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-family: 'Orbitron', sans-serif;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: var(--glow-primary);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(0, 255, 136, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .scan-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.7s;
    }

    button:hover::after {
      transform: translateX(100%);
    }

    /* Loading status */
    .loading-status {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.875rem;
      color: var(--primary);
      font-family: 'Courier New', monospace;
      animation: slide-up 0.5s ease-out;
    }

    .loading-dot {
      height: 8px;
      width: 8px;
      border-radius: 50%;
      background: var(--primary);
      animation: blink 1s infinite;
    }

    /* Result card */
    .result-card {
      margin-top: 1.5rem;
      padding: 1.25rem;
      border-radius: 0.75rem;
      border: 2px solid;
      backdrop-filter: blur(10px);
      animation: slide-up 0.6s ease-out;
    }

    .result-icon {
      flex-shrink: 0;
      height: 1.75rem;
      width: 1.75rem;
    }

    .safe { background: var(--gradient-safe); border-color: rgba(0,255,136,0.5); color: var(--primary); box-shadow: 0 0 40px rgba(0,255,136,0.4); }
    .suspicious { background: var(--gradient-warning); border-color: rgba(255,170,0,0.5); color: var(--warning); box-shadow: 0 0 40px rgba(255,170,0,0.4); }
    .phishing { background: var(--gradient-danger); border-color: rgba(255,71,87,0.6); color: var(--destructive); box-shadow: 0 0 40px rgba(255,71,87,0.5); }
    .error { background: rgba(20,20,30,0.5); border-color: rgba(255,107,157,0.4); color: var(--accent); box-shadow: 0 0 30px rgba(255,107,157,0.3); }

    .result-header {
      font-size: 1.125rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: 'Orbitron', sans-serif;
    }

    .result-message {
      font-size: 0.875rem;
      line-height: 1.6;
      margin-bottom: 1rem;
      opacity: 0.9;
    }

    .result-details {
      padding-top: 0.75rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 0.75rem;
      font-family: 'Courier New', monospace;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .detail-label { color: var(--muted-foreground); text-transform: uppercase; }
    .detail-value { font-weight: 500; }

    /* Footer */
    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(200,200,220,0.7);
      font-family: 'Courier New', monospace;
      animation: slide-up 0.8s ease-out 0.2s both;
    }

    .alert { color: var(--primary); }

    /* Animations */
    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 640px) {
      main { padding: 1rem 0.5rem; }
      .scanner-card { padding: 1.25rem; }
    }

    /* Icon SVGs */
    .icon-shield { /* ShieldCheck */ fill: currentColor; }
    .icon-triangle { /* AlertTriangle */ fill: currentColor; }
    .icon-alert { /* ShieldAlert */ fill: currentColor; }
    .icon-terminal { /* Terminal */ fill: currentColor; }
    .icon-link { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <div class="container">
      <!-- Header -->
      <header>
        <div class="status-badge">
          <span class="status-dot"></span>
          System Online
        </div>
        <h1>CYBERSHIELD</h1>
        <p>Advanced ML-powered threat analysis. Paste any URL to detect phishing, suspicious or safe classification in real-time.</p>
      </header>

      <!-- Scanner Card -->
      <section class="scanner-card" id="scannerCard">
        <!-- Corner brackets -->
        <span class="bracket bracket-tl"></span>
        <span class="bracket bracket-tr"></span>
        <span class="bracket bracket-bl"></span>
        <span class="bracket bracket-br"></span>

        <!-- Scanner line (hidden by default) -->
        <div class="scanner-line" id="scannerLine" style="display: none;"></div>

        <form id="scanForm">
          <label for="urlInput">
            <svg class="icon-link" height="14" viewBox="0 0 24 24" width="14"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>
            Target URL
          </label>
          <input 
            type="url" 
            id="urlInput" 
            placeholder="https://example.com"
            required
          >
          <button type="submit" id="scanBtn">
            <span id="btnContent">
              <svg class="icon-shield" height="20" viewBox="0 0 24 24" width="20"><path d="M12 22s8-4 8-10V7a2 2 0 0 0-2-2h-5.69A8 8 0 0 0 12 2a8 8 0 0 0-2.31 3H4a2 2 0 0 0-2 2v3c0 6 8 10 8 10z"/></svg>
              Initiate Scan
            </span>
          </button>
        </form>

        <!-- Loading status -->
        <div class="loading-status" id="loadingStatus" style="display: none;">
          <span class="loading-dot"></span>
          <span>Analyzing URL signature<span id="dots">...</span></span>
        </div>

        <!-- Result -->
        <div class="result-card" id="resultCard" style="display: none;"></div>
      </section>

      <footer>
        <span class="alert">[!]</span> ML-based risk assessment. Always verify unknown links before entering credentials.
      </footer>
    </div>
  </main>

  <script>
    class CyberShield {
      constructor() {
        this.urlInput = document.getElementById('urlInput');
        this.scanForm = document.getElementById('scanForm');
        this.scanBtn = document.getElementById('scanBtn');
        this.btnContent = document.getElementById('btnContent');
        this.loadingStatus = document.getElementById('loadingStatus');
        this.resultCard = document.getElementById('resultCard');
        this.scannerLine = document.getElementById('scannerLine');
        this.dotsEl = document.getElementById('dots');
        this.url = '';

        this.init();
      }

      init() {
        this.scanForm.addEventListener('submit', (e) => this.analyze(e));
        this.createParticles();
        this.animateDots();
      }

      createParticles() {
        const particles = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.top = Math.random() * 100 + '%';
          particle.style.animationDelay = Math.random() * 4 + 's';
          particle.style.animationDuration = (4 + Math.random() * 6) + 's';
          particles.appendChild(particle);
        }
      }

      animateDots() {
        let dotCount = 0;
        setInterval(() => {
          dotCount = (dotCount + 1) % 4;
          this.dotsEl.textContent = '.'.repeat(dotCount);
        }, 500);
      }

      async analyze(e) {
        e.preventDefault();
        this.url = this.urlInput.value.trim();

        if (!this.url) {
          this.showError('Input Required', 'Enter a URL before initiating the scan.');
          return;
        }

        this.setLoading(true);
        this.resultCard.style.display = 'none';

        try {
          const response = await fetch('/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: this.url })
          });

          if (!response.ok) throw new Error('API error');

          const data = await response.json();

          let verdict = 'safe';
          let title = 'Legitimate Website';
          let message = 'This URL appears safe based on the current machine learning analysis.';

          if (data.result === 'Phishing Website') {
            verdict = 'phishing';
            title = 'Phishing Website Detected';
            message = 'This URL appears highly suspicious. Do not enter passwords, OTPs, banking details, or personal information.';
          } else if (data.result === 'Suspicious Website') {
            verdict = 'suspicious';
            title = 'Suspicious Website';
            message = 'This URL shows some suspicious indicators. Please verify the website carefully before trusting it.';
          }

          this.showResult(verdict, title, message, data);
        } catch (error) {
          this.showError('Connection Error', 'Could not connect to the detection server. Make sure the Flask API is running.');
        } finally {
          this.setLoading(false);
        }
      }

      setLoading(loading) {
        this.scanBtn.disabled = loading;
        this.scannerLine.style.display = loading ? 'block' : 'none';
        this.loadingStatus.style.display = loading ? 'flex' : 'none';
        if (loading) {
          this.btnContent.innerHTML = `
            <svg class="icon-shield" height="20" viewBox="0 0 24 24" width="20">
              <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round">
                <animate attributeName="stroke-dasharray" values="0,88.9 157"; dur="1.5s"; repeatCount="indefinite"/>
                <animate attributeName="stroke-dashoffset" values="89,89,0"; dur="1.5s"; repeatCount="indefinite"/>
              </circle>
            </svg>
            Scanning...
          `;
        } else {
          this.btnContent.innerHTML = `
            <svg class="icon-shield" height="20" viewBox="0 0 24 24" width="20">
              <path d="M12 22s8-4 8-10V7a2 2 0 0 0-2-2h-5.69A8 8 0 0 0 12 2a8 8 0 0 0-2.31 3H4a2 2 0 0 0-2 2v3c0 6 8 10 8 10z"/>
            </svg>
            Initiate Scan
          `;
        }
      }

      showResult(verdict, title, message, data) {
        const icon = this.getIcon(verdict);
        const probability = data.phishing_probability || '';
        const processedUrl = data.url || this.url;

        this.resultCard.className = `result-card ${verdict}`;
        this.resultCard.innerHTML = `
          <div style="display: flex; align-items: flex-start; gap: 1rem;">
            <div class="result-icon">${icon}</div>
            <div style="flex: 1; min-width: 0;">
              <h3 class="result-header">${title}</h3>
              <p class="result-message">${message}</p>
              <div class="result-details">
                <div class="detail-row">
                  <span class="detail-label">Verdict:</span>
                  <span class="detail-value">${data.result}</span>
                </div>
                ${probability ? `
                  <div class="detail-row">
                    <span class="detail-label">Phishing Probability:</span>
                    <span class="detail-value">${probability}</span>
                  </div>
                ` : ''}
                <div class="detail-row">
                  <span class="detail-label">URL:</span>
                  <span class="detail-value" style="word-break: break-all;">${processedUrl}</span>
                </div>
              </div>
            </div>
          </div>
        `;
        this.resultCard.style.display = 'block';
      }

      showError(title, message) {
        const icon = this.getIcon('error');
        this.resultCard.className = 'result-card error';
        this.resultCard.innerHTML = `
          <div style="display: flex; align-items: flex-start; gap: 1rem;">
            <div class="result-icon">${icon}</div>
            <div style="flex: 1; min-width: 0;">
              <h3 class="result-header">${title}</h3>
              <p class="result-message">${message}</p>
            </div>
          </div>
        `;
        this.resultCard.style.display = 'block';
      }

      getIcon(type) {
        const icons = {
          safe: '<svg class="icon-shield" viewBox="0 0 24 24" height="28" width="28"><path d="M12 22s8-4 8-10V7a2 2 0 0 0-2-2h-5.69A8 8 0 0 0 12 2a8 8 0 0 0-2.31 3H4a2 2 0 0 0-2 2v3c0 6 8 10 8 10z"/><circle cx="12" cy="11" r="3"/></svg>',
          suspicious: '<svg class="icon-triangle" viewBox="0 0 24 24" height="28" width="28"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12" y2="16"/></svg>',
          phishing: '<svg class="icon-alert" viewBox="0 0 24 24" height="28" width="28"><path d="M20.71 7.04c.39-.39.39-1.02.0-1.41l-2.34-2.34c-.37-.38-1.02-.38-1.41 0l-1.84 1.83a1.72 1.72 0 0 0-.33.52 14.66 14.66 0 0 0-6.31-6.31 1.75 1.75 0 0 0-.54-.34L6.71 3.29a.96.96 0 0 0-1.4 0L3.29 5.7a.96.96 0 0 0 0 1.4l1.83 1.84a1.75 1.75 0 0 1-.34.54C3.37 10.09 2 13.99 2 18v3a1 1 0 0 0 1 1h3c4 0 7.91-1.37 10.71-3.71a1.75 1.75 0 0 1 .54-.34l1.84-1.83c.39-.39.39-1.03 0-1.42l-2.34-2.33a.96.96 0 0 1 0-1.41l2.34-2.34c.39-.4.39-1.03 0-1.42zM12 17a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm-1-8h2v4h-2z"/></svg>',
          error: '<svg class="icon-terminal" viewBox="0 0 24 24" height="28" width="28"><polyline points="4 17 10 11 4 5"/><polyline points="14 17 20 11 14 5"/></svg>'
        };
        return icons[type] || icons.safe;
      }
    }

    // Initialize app
    document.addEventListener('DOMContentLoaded', () => {
      new CyberShield();
    });
  </script>
</body>
</html>
